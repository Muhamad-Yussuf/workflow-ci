name: Reusable - Docker Build & Push

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      env:
        required: true
        type: string
      gcp_project:
        required: true
        type: string
      artifact_location:
        required: true
        type: string
      image:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      build_args:
        required: false
        type: string
        default: ""
      service_account:
        required: true
        type: string
      wif_provider:
        required: false
        type: string
    outputs:
      image_tag:
        description: "Built image tag"
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      latest_tag:
        description: "Latest image tag"
        value: ${{ jobs.build-and-push.outputs.latest_tag }}
      short_sha:
        description: "Short SHA"
        value: ${{ jobs.build-and-push.outputs.short_sha }}
    secrets:
      GCP_WIF_PROVIDER:
        required: false

env:
  DOCKER_BUILDKIT: 1
  # Stable cache tag per app/env to avoid cold builds on every commit
  CACHE_TAG: ${{ inputs.artifact_location }}-docker.pkg.dev/${{ inputs.gcp_project }}/${{ inputs.app }}-${{ inputs.env }}/${{ inputs.image }}:cache

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # For PRs we build for validation but do not push
    outputs:
      image_tag: ${{ steps.tags.outputs.image_tag }}
      latest_tag: ${{ steps.tags.outputs.latest_tag }}
      short_sha: ${{ steps.tags.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          SHORT=${GITHUB_SHA::7}
          IMAGE_TAG="${{ inputs.artifact_location }}-docker.pkg.dev/${{ inputs.gcp_project }}/${{ inputs.app }}-${{ inputs.env }}/${{ inputs.image }}:${SHORT}"
          LATEST_TAG="${{ inputs.artifact_location }}-docker.pkg.dev/${{ inputs.gcp_project }}/${{ inputs.app }}-${{ inputs.env }}/${{ inputs.image }}:latest"
          echo "image_tag=$IMAGE_TAG"   >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "short=$SHORT"           >> $GITHUB_OUTPUT

      - name: Decide whether to push
        id: pushflag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "push_enabled=false" >> $GITHUB_OUTPUT
          else
            echo "push_enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: Auth to GCP via OIDC
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.wif_provider != '' && inputs.wif_provider || secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ inputs.service_account }}
          project_id: ${{ inputs.gcp_project }}
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform
          create_credentials_file: true
          token_format: access_token

      - name: Setup gcloud (preinstalled)
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ inputs.gcp_project }}
          skip_install: true

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Artifact Registry Docker helper
        run: gcloud auth configure-docker "${{ inputs.artifact_location }}-docker.pkg.dev" --quiet

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ steps.pushflag.outputs.push_enabled == 'true' }}
          pull: true
          tags: |
            ${{ steps.tags.outputs.image_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=registry,ref=${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ env.CACHE_TAG }},mode=max,ttl=168h
